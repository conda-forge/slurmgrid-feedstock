{% set version = "0.1.2" %}

package:
  name: slurmgrid
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/slurmgrid/slurmgrid-{{ version }}.tar.gz
  sha256: 90d6e76620088cded124b3628a21b63badedade45c89ca7c5b6bdb7f49505578

build:
  entry_points:
    - slurmgrid = slurmgrid.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - pip
  run:
    - python >={{ python_min }}
    - configargparse
    - pyyaml

test:
  imports:
    - slurmgrid
  commands:
    - pip check
    - slurmgrid --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/slurmgrid/
  summary: Manage large Slurm job arrays that exceed cluster submission limits
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jgaeb
